<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Bollyfit Dance Studio logo">
  <defs>
    <radialGradient id="burst" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd26f" />
      <stop offset="45%" stop-color="#ff7ad9" />
      <stop offset="100%" stop-color="#66d7ff" />
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" />
    </filter>
  </defs>
  <rect width="200" height="200" rx="44" fill="#0b0c12" />
  <g opacity="0.9" filter="url(#soft)">
    <circle cx="70" cy="65" r="58" fill="url(#burst)" />
    <circle cx="135" cy="80" r="50" fill="url(#burst)" opacity="0.8" />
    <circle cx="95" cy="135" r="55" fill="url(#burst)" opacity="0.85" />
  </g>
  <text x="100" y="120" font-family="Bebas Neue, Arial, sans-serif" font-size="72" fill="#ffffff" text-anchor="middle" letter-spacing="6">
    BDS
  </text>
</svg>
